# Build web/ and deploy to GitHub Pages. Enable in: Settings → Pages → Build: GitHub Actions.
name: Deploy RPA web to GitHub Pages

on:
  push:
    branches: [rpa-ghpages]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install and build
        working-directory: web
        run: |
          npm ci
          npm run build
        env:
          CI: true
          # 自定义域名(根路径) 必须用 /; 仅使用 username.github.io/<repo>/ 时删除下一行
          GH_PAGES_BASE: /
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
